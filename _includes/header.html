<header>

      <defs>
        <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#1a2e1a" stop-opacity="0"/>
          <stop offset="100%" stop-color="#2d4a2d" stop-opacity="0.5"/>
        </linearGradient>
        <linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">

          <stop offset="100%" stop-color="#e8a030"/>

          <stop offset="0%" stop-color="#2d4a2d"/>
          <stop offset="100%" stop-color="#1a2e1a"/>

        <filter id="blur-slight"><feGaussianBlur stdDeviation="1.5"/></filter>
